<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#1e3c72">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Тест по историческим датам</title>
<style>
  :root {
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
    --accent-gradient: linear-gradient(90deg, #4facfe, #00f2fe);
    --correct-color: #38ef7d;
    --wrong-color: #f45c43;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #fff; padding: 20px; min-height: 100vh; overflow-x: hidden; }
  @supports (padding: env(safe-area-inset-top)) { body { padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: calc(20px + env(safe-area-inset-bottom)); } }

  /* === АНИМАЦИИ === */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 70% { transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px) rotate(-2deg); } 40% { transform: translateX(10px) rotate(2deg); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
  @keyframes correctBounce { 0% { transform: scale(1); } 30% { transform: scale(1.1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  /* === LAYOUT === */
  .layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 25px; align-items: start; }
  .container, .sidebar { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .container { padding: 35px; min-height: 500px; position: relative; animation: fadeInUp 0.8s var(--ease-smooth) both; }
  .sidebar { position: sticky; top: 20px; padding: 30px; animation: fadeInUp 0.8s var(--ease-smooth) 0.2s both; }

  h1 { text-align: center; margin-bottom: 15px; font-size: 2.2em; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: popIn 0.8s var(--ease-spring) 0.3s both; }
  .subtitle { text-align: center; opacity: 0.8; margin-bottom: 35px; font-size: 1.1em; animation: fadeInUp 0.8s var(--ease-smooth) 0.4s both; }

  /* === МЕНЮ === */
  .menu-animate .section-btn { animation: slideInRight 0.6s var(--ease-smooth) both; }
  .menu-animate .section-btn:nth-child(1) { animation-delay: 0.1s; }
  .menu-animate .section-btn:nth-child(2) { animation-delay: 0.15s; }
  .menu-animate .section-btn:nth-child(3) { animation-delay: 0.2s; }
  .menu-animate .section-btn:nth-child(4) { animation-delay: 0.25s; }
  .menu-animate .section-btn:nth-child(5) { animation-delay: 0.3s; }
  .menu-animate .section-btn:nth-child(6) { animation-delay: 0.35s; }

  .section-btn { display: block; width: 100%; padding: 20px 25px; margin: 15px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; color: #fff; font-size: 1.1em; font-weight: 600; cursor: pointer; text-align: left; position: relative; overflow: hidden; transition: all 0.3s var(--ease-smooth); }
  .section-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-gradient); opacity: 0; transition: opacity 0.3s; }
  .section-btn:hover { background: rgba(255,255,255,0.12); transform: translateX(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-color: rgba(79, 172, 254, 0.5); }
  .section-btn:hover::before { opacity: 1; }
  .section-btn:active { transform: translateX(4px) scale(0.99); }
  .section-btn .count { float: right; opacity: 0.6; font-weight: 400; font-size: 0.9em; }

  /* === САЙДБАР И КНОПКА РЕЖИМА === */
  .sidebar h3 { margin-bottom: 20px; font-size: 1.2em; letter-spacing: 0.5px; }
  
  .mode-switcher { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
  
  /* Новая кнопка переключения */
  .mode-toggle-btn {
    width: 100%;
    padding: 14px 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: #fff;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s var(--ease-smooth);
    outline: none;
    position: relative;
    overflow: hidden;
  }
  
  .mode-toggle-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(79, 172, 254, 0.5);
  }
  
  /* Анимация уменьшения при нажатии */
  .mode-toggle-btn:active {
    transform: scale(0.92);
    transition-duration: 0.1s;
  }
  
  /* Активное состояние кнопки (режим Знание) */
  .mode-toggle-btn.active {
    background: linear-gradient(90deg, #f093fb, #f5576c);
    border-color: transparent;
    box-shadow: 0 0 20px rgba(245, 92, 108, 0.3);
  }

  .mode-desc { 
    font-size: 0.85em; 
    opacity: 0.6; 
    margin-top: 12px; 
    min-height: 1.2em; 
    text-align: center;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  /* Ползунок количества вопросов */
  .slider-value { text-align: center; font-size: 3.5em; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; line-height: 1; }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: var(--accent-gradient); border-radius: 50%; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 3px solid #fff; transition: transform 0.2s var(--ease-spring); }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  /* === ВИКТОРИНА === */
  .quiz-container { animation: fadeInUp 0.5s var(--ease-smooth) both; }
  .progress-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; margin-bottom: 30px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
  .progress-fill { height: 100%; background: var(--accent-gradient); border-radius: 10px; transition: width 0.6s var(--ease-smooth); position: relative; }
  .progress-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2s infinite; }

  .question-box { background: rgba(255,255,255,0.08); padding: 30px; border-radius: 20px; margin-bottom: 25px; text-align: center; border: 1px solid var(--glass-border); animation: popIn 0.5s var(--ease-spring) 0.1s both; }
  .question-box .highlight { font-size: 1.5em; font-weight: 700; color: #00f2fe; margin-top: 10px; display: block; text-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .option-btn { padding: 18px 20px 18px 65px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; color: #fff; font-size: 1.05em; cursor: pointer; text-align: left; position: relative; transition: all 0.3s var(--ease-smooth); }
  .quiz-container .option-btn { animation: slideInRight 0.4s var(--ease-smooth) both; }
  .quiz-container .option-btn:nth-child(1){animation-delay:0.1s} 
  .quiz-container .option-btn:nth-child(2){animation-delay:0.15s}
  .quiz-container .option-btn:nth-child(3){animation-delay:0.2s} 
  .quiz-container .option-btn:nth-child(4){animation-delay:0.25s}

  .option-btn .key-hint { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1em; transition: all 0.3s; }
  .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: translateY(-3px); border-color: rgba(79, 172, 254, 0.6); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
  .option-btn:hover:not(:disabled) .key-hint { background: var(--accent-gradient); }
  .option-btn.correct { background: linear-gradient(135deg, #11998e, #38ef7d) !important; border-color: #38ef7d !important; animation: correctBounce 0.5s var(--ease-spring) !important; }
  .option-btn.wrong { background: linear-gradient(135deg, #eb3349, #f45c43) !important; border-color: #f45c43 !important; animation: shake 0.5s !important; }

  /* Ввод */
  .input-mode-container { max-width: 500px; margin: 0 auto; animation: popIn 0.5s var(--ease-spring) both; }
  .answer-input { width: 100%; padding: 18px 25px; font-size: 1.2em; border: 2px solid rgba(255,255,255,0.3); border-radius: 16px; background: rgba(255,255,255,0.1); color: #fff; text-align: center; outline: none; transition: all 0.3s; margin-bottom: 15px; }
  .answer-input:focus { border-color: #00f2fe; background: rgba(255,255,255,0.15); box-shadow: 0 0 25px rgba(0, 242, 254, 0.2); }
  .submit-answer-btn { width: 100%; padding: 16px; background: var(--accent-gradient); border: none; border-radius: 14px; color: #fff; font-size: 1.1em; font-weight: 700; cursor: pointer; transition: all 0.3s; }
  .submit-answer-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4); }
  .feedback-msg { min-height: 30px; margin-top: 15px; font-weight: 700; font-size: 1.1em; animation: fadeInUp 0.3s both; }
  .correct-text { color: var(--correct-color); text-shadow: 0 0 15px rgba(56, 239, 125, 0.4); }
  .wrong-text { color: var(--wrong-color); text-shadow: 0 0 15px rgba(244, 92, 67, 0.4); }

  .result-box { text-align: center; padding: 40px 20px; animation: popIn 0.6s var(--ease-spring) both; }
  .score { font-size: 4em; font-weight: 800; margin: 25px 0; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 30px rgba(79, 172, 254, 0.4)); }
  .restart-btn { padding: 16px 35px; background: var(--accent-gradient); color: #fff; border: none; border-radius: 14px; font-size: 1.1em; font-weight: 700; cursor: pointer; margin: 8px; transition: all 0.3s; display: inline-block; }
  .restart-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(79, 172, 254, 0.4); }
  .back-btn { margin-top: 25px; padding: 14px 25px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; cursor: pointer; font-size: 1em; transition: all 0.3s; width: 100%; }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { position: relative; top: 0; order: -1; } .options { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { body { padding: 10px; } .container { padding: 20px; border-radius: 20px; } h1 { font-size: 1.6em; } .question-box { padding: 20px; } .question-box .highlight { font-size: 1.2em; } .option-btn { padding: 15px 15px 15px 55px; font-size: 0.95em; } .option-btn .key-hint { width: 32px; height: 32px; left: 12px; font-size: 1em; } .score { font-size: 3em; } }
</style>
</head>
<body>

<div class="layout">
  <div class="container" id="app"></div>

  <aside class="sidebar">
    <h3>Настройки</h3>
    
    <div class="mode-switcher">
      <button type="button" class="mode-toggle-btn" id="modeBtn" onclick="toggleMode()">
        Режим: Тест
      </button>
      <div class="mode-desc" id="modeDesc">Выбирай из 4 вариантов</div>
    </div>

    <div class="slider-value">
      <span id="sliderValue">10</span>
      <small style="display:block;font-size:0.3em;opacity:0.7;margin-top:5px;-webkit-text-fill-color:#fff">вопросов</small>
    </div>
    <input type="range" id="questionsSlider" min="10" max="50" step="5" value="10" oninput="updateSlider(this.value)">
    <div style="display:flex;justify-content:space-between;font-size:0.8em;opacity:0.6;margin-top:8px">
      <span>10</span><span>30</span><span>50</span>
    </div>

    <div style="margin-top:25px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);font-size:0.9em;opacity:0.8">
      <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Всего дат:</span> <span style="color:#00f2fe;font-weight:700" id="totalDates">—</span></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Разделов:</span> <span style="color:#00f2fe;font-weight:700" id="totalSections">—</span></div>
    </div>
  </aside>
</div>

<script>
var sections = [
  { title: "Мировая история до 1917", items: [

    { event: "Испано-американская война", date: "1898 г." },
    { event: "Англо-бурская война", date: "1899–1902 гг." },
    { event: "Русско-японская война", date: "1904–1905 гг." },
    { event: "Образование Антанты (Великобритания, Франция, Россия)", date: "1907 г." },
    { event: "Первая мировая война", date: "1914–1918 гг." }
  ]},
  { title: "Революция и Гражданская война (1915–1922)", items: [

  { title: "СССР: межвоенный период и ВОВ (1922–1945)", items: [

    { event: "Битва на Курской дуге", date: "1943, 5 июля – 23 августа" },

    { event: "В.В. Путин одержал победу на президентских выборах", date: "2024 г., март" }

];

var questionsPerQuiz = 10, currentSection = null, questions = [], currentIndex = 0, score = 0, isWaitingForNext = false, inputMode = false;
var totalDates = sections.reduce(function(s,x){return s+x.items.length},0);
document.getElementById('totalDates').textContent = totalDates;
document.getElementById('totalSections').textContent = sections.length;

function safeScrollTop(){try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){window.scrollTo(0,0)}}

// Обновленная функция для кнопки
function toggleMode(){
  inputMode = !inputMode;
  var btn = document.getElementById('modeBtn');
  var desc = document.getElementById('modeDesc');
  
  // Переключение визуального класса кнопки
  if(inputMode) {
    btn.classList.add('active');
    btn.textContent = 'Режим: Знание';
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Режим: Тест';
  }
  
  // Анимация смены текста описания
  desc.style.opacity = '0';
  desc.style.transform = 'translateY(-5px)';
  setTimeout(function(){
    desc.textContent = inputMode ? 'Пиши ответ сам (можно частично)' : 'Выбирай из 4 вариантов';
    desc.style.opacity = '0.6';
    desc.style.transform = 'translateY(0)';
  }, 200);
  
  if(currentSection && questions.length > 0 && currentIndex < questions.length) renderQuestion();
}

function updateSlider(v){
  questionsPerQuiz=parseInt(v,10);
  document.getElementById('sliderValue').textContent=v;
  if(document.getElementById('menuButtons'))renderMenu(true);
}

function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function buildDateOptions(c,p){var w=shuffle(p.map(function(i){return i.date}).filter(function(d){return d!==c})).slice(0,3);return shuffle([c].concat(w))}
function buildEventOptions(c,p){var w=shuffle(p.map(function(i){return i.event}).filter(function(e){return e!==c})).slice(0,3);return shuffle([c].concat(w))}

function renderMenu(skipAnimation){
  var app=document.getElementById('app');
  var animClass = skipAnimation ? '' : ' menu-animate';
  var h='<h1>Тест по датам</h1><p class="subtitle">Выбери раздел для начала</p><div id="menuButtons" class="'+animClass+'">';
  sections.forEach(function(s,i){
    var av=s.items.length,ac=Math.min(questionsPerQuiz,av);
    h+='<button class="section-btn" onclick="startQuiz('+i+')">'+s.title+'<span class="count">'+(ac<av?ac+' из '+av:av)+' дат</span></button>';
  });
  h+='<button class="section-btn" onclick="startAllQuiz()" style="background:linear-gradient(90deg,#f093fb,#f5576c);border:none">Микс из всех разделов<span class="count">'+totalDates+'</span></button></div>';
  app.innerHTML=h;
}

function buildQuestions(pool){
  var c=Math.min(questionsPerQuiz,pool.length),p=shuffle(pool).slice(0,c);
  return p.map(function(q){
    var t=Math.random()<0.5?'year':'event';
    var o={type:t,prompt:t==='year'?q.event:q.date,correct:t==='year'?q.date:q.event};
    if(!inputMode)o.options=t==='year'?buildDateOptions(q.date,pool):buildEventOptions(q.event,pool);
    return o;
  });
}

function startQuiz(i){currentSection=sections[i];questions=buildQuestions(currentSection.items);currentIndex=0;score=0;renderQuestion();safeScrollTop()}
function startAllQuiz(){var a=[];sections.forEach(function(s){a=a.concat(s.items)});currentSection={title:"Микс"};questions=buildQuestions(a);currentIndex=0;score=0;renderQuestion();safeScrollTop()}

function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function renderQuestion(){
  var app=document.getElementById('app');isWaitingForNext=false;
  if(currentIndex>=questions.length)return renderResult();
  var q=questions[currentIndex],pr=(currentIndex/questions.length)*100;
  var tl=inputMode?(q.type==='year'?'Напиши год':'Напиши событие'):(q.type==='year'?'Угадай год':'Угадай событие');
  var area='';
  if(inputMode){
    area='<div class="input-mode-container"><input type="text" class="answer-input" id="ai" placeholder="'+(q.type==='year'?'Например: 1945':'Название события...')+'" autocomplete="off"><button class="submit-answer-btn" onclick="submitAns()">Ответить</button><div class="feedback-msg" id="fb"></div></div>';
  }else{
    var oh='';q.options.forEach(function(o,i){oh+='<button class="option-btn" data-v="'+esc(o)+'" data-c="'+esc(q.correct)+'" onclick="ansChoice(this)"><span class="key-hint">'+(i+1)+'</span>'+o+'</button>'});
    area='<div class="options" id="opts">'+oh+'</div>';
  }
  app.innerHTML='<div class="quiz-container"><div style="display:flex;justify-content:space-between;margin-bottom:15px;opacity:0.8;font-size:0.95em"><strong>'+currentSection.title+'</strong><span>'+(currentIndex+1)+'/'+questions.length+' | Верно: '+score+'</span></div><div style="margin-bottom:15px"><span style="display:inline-block;padding:4px 14px;background:rgba(255,255,255,0.15);border-radius:20px;font-size:0.85em">'+tl+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pr+'%"></div></div><div class="question-box"><div>'+(q.type==='year'?'В каком году произошло:':'Какое событие произошло в')+'</div><span class="highlight">'+q.prompt+'</span></div>'+area+'<button class="back-btn" onclick="renderMenu()">Вернуться в меню</button></div>';
  safeScrollTop();
  if(inputMode)setTimeout(function(){var inp=document.getElementById('ai');if(inp){inp.focus();inp.onkeydown=function(e){if(e.key==='Enter')submitAns()}}},100);
}

function norm(s){return s.toLowerCase().replace(/[.,;:!?()\-\s]+/g,' ').trim()}

function checkYear(u,c){
  var un=u.match(/\d{4}/g)||[],cn=c.match(/\d{4}/g)||[];
  for(var i=0;i<un.length;i++)for(var j=0;j<cn.length;j++)if(un[i]===cn[j])return true;
  return false;
}

function checkTextAnswer(userAns, correctAns) {
  var u = norm(userAns);
  var c = norm(correctAns);
  if (u === c) return true;
  if (u.length >= 3 && c.indexOf(u) !== -1) return true;
  if (c.length >= 3 && u.indexOf(c) !== -1) return true;
  return false;
}

function submitAns(){
  if(isWaitingForNext)return;var inp=document.getElementById('ai'),fb=document.getElementById('fb');if(!inp||!inp.value.trim())return;
  isWaitingForNext=true;inp.disabled=true;document.querySelector('.submit-answer-btn').disabled=true;
  var q=questions[currentIndex];
  var ok = q.type==='year' ? checkYear(inp.value,q.correct) : checkTextAnswer(inp.value, q.correct);
  if(ok){inp.classList.add('correct');fb.innerHTML='Верно!';fb.className='feedback-msg correct-text';score++}
  else{inp.classList.add('wrong');fb.innerHTML='Правильно: '+q.correct;fb.className='feedback-msg wrong-text'}
  setTimeout(function(){currentIndex++;renderQuestion()},2000);
}

function ansChoice(btn){
  if(isWaitingForNext||btn.disabled)return;isWaitingForNext=true;
  var bs=document.querySelectorAll('#opts .option-btn'),s=btn.getAttribute('data-v'),c=btn.getAttribute('data-c');
  bs.forEach(function(b){b.disabled=true});
  if(s===c){btn.classList.add('correct');score++}else{btn.classList.add('wrong');bs.forEach(function(b){if(b.getAttribute('data-v')===c)b.classList.add('correct')})}
  setTimeout(function(){currentIndex++;renderQuestion()},1300);
}

function renderResult(){
  var app=document.getElementById('app');isWaitingForNext=true;
  var p=Math.round(score/questions.length*100),m=p===100?"Идеально!":p>=80?"Отлично!":p>=50?"Неплохо":"Повтори даты";
  var idx=sections.indexOf(currentSection),ra=idx!==-1?'startQuiz('+idx+')':'startAllQuiz()';
  app.innerHTML='<div class="result-box"><h2>Тест завершён</h2><p style="opacity:0.7;margin-bottom:10px">'+currentSection.title+'</p><div class="score">'+score+'/'+questions.length+'</div><p style="font-size:1.3em;margin-bottom:25px">'+m+' ('+p+'%)</p><button class="restart-btn" onclick="'+ra+'">Ещё раз</button><button class="restart-btn" onclick="renderMenu()" style="background:rgba(255,255,255,0.15)">В меню</button></div>';
  safeScrollTop();
}

document.addEventListener('keydown',function(e){
  if(inputMode)return;var n=null;
  if(e.key>='1'&&e.key<='4')n=+e.key;else if(e.code&&e.code.indexOf('Numpad')===0){var x=+e.code.replace('Numpad','');if(x>=1&&x<=4)n=x}
  if(!n||isWaitingForNext)return;var bs=document.querySelectorAll('#opts .option-btn');if(bs.length&&bs[n-1]&&!bs[n-1].disabled)ansChoice(bs[n-1]);
});

renderMenu();
</script>
</body>
